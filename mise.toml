[tools]
go = "1.26.4"
"npm:figlet" = "latest"

[hooks]
enter = """
figlet SQLcery
echo "$(go version)"
"""

[tasks.webdev]
dir = "../webdev"
description = "Start webdev"
run = "docker compose up -d mysql8 pgsql"

[tasks.check-go-version]
description = "Verify Go version stays aligned"
run = '''
tool_version="$(go env GOVERSION)"
tool_version="${tool_version#go}"
mod_version="$(grep '^go ' go.mod | awk '{print $2}')"
mise_version="$(grep -E '^go\s*=' mise.toml | sed 's/.*"\(.*\)".*/\1/')"

if [ "$tool_version" != "$mod_version" ]; then
  printf 'Go toolchain version %s does not match go.mod %s\n' "$tool_version" "$mod_version" >&2
  exit 1
fi

if [ "$mise_version" != "$mod_version" ]; then
  printf 'mise Go version %s does not match go.mod %s\n' "$mise_version" "$mod_version" >&2
  exit 1
fi

printf 'Go version aligned at %s\n' "$mod_version"
'''

[tasks.fmt]
description = "Format Go code"
run = "gofmt -w ."

[tasks.test]
description = "Run Go tests"
run = "go test ./..."
depends = ["check-go-version"]

[tasks.test-targeted]
description = "Run targeted Go tests"
run = "go test ./cmd/sqlcery ./internal/app"
depends = ["check-go-version"]

[tasks.test-db]
description = "Run internal db package tests"
run = "go test ./internal/db"
depends = ["check-go-version"]

[tasks.lint]
description = "Run golangci-lint"
run = "go run github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8 run ./..."
depends = ["check-go-version"]

[tasks.release-snapshot]
description = "Build snapshot release binaries"
run = "go run github.com/goreleaser/goreleaser/v2@v2.15.2 build --snapshot --clean --config .goreleaser.yaml"
depends = ["check-go-version"]

[tasks.release]
description = "Publish a GitHub release"
run = "go run github.com/goreleaser/goreleaser/v2@v2.15.2 release --clean --config .goreleaser.yaml --release-notes-tmpl .github/release-notes.md.tmpl"
depends = ["check-go-version"]

[settings]
experimental = true
