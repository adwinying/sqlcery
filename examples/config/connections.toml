# Example SQLcery named connections.
#
# Supported locations:
# - $XDG_CONFIG_HOME/sqlcery/connections.toml
# - ./connections.toml
#
# Files load global first, then local. A local file can add new connections
# and override individual fields on a connection with the same name.

[connection.local]
type = "sqlite"
database = "tmp/sqlcery.db"
# color highlights the connection name in the UI.
# Accepted values:
#   - Named colors:     "red", "green", "blue", "yellow", "cyan", "magenta",
#                       "white", "black", and bright variants like "bright-red"
#   - ANSI 256 numbers: "196", "46", "21", etc.
#   - Hex color codes:  "#ff0000", "#00cc44", etc.
color = "blue"

[connection.local.lifecycle]
connect_timeout = "2s"
health_check_timeout = "500ms"
max_open_conns = 1
max_idle_conns = 1
conn_max_lifetime = "30m"
conn_max_idle_time = "5m"

[connection.mypgsql]
type = "postgres"
ssh_host = "bastion"
host = "db.internal"
port = 5432
database = "warehouse"
username = "app"
password = "secret"

[connection.mypgsql.lifecycle]
connect_timeout = "7s"
health_check_timeout = "1500ms"
max_open_conns = 12
max_idle_conns = 6
conn_max_lifetime = "45m"
conn_max_idle_time = "10m"

[connection.mysql]
type = "mysql"
host = "127.0.0.1"
port = 3307
database = "sqlcery"
username = "root"
password = "secret"

[connection.mysql.lifecycle]
connect_timeout = "3s"
health_check_timeout = "750ms"
max_open_conns = 4
max_idle_conns = 2
conn_max_lifetime = "20m"
conn_max_idle_time = "4m"
